<div class="empty">
  <div class="empty__ilustracion">
    @switch (icono) {
      @case ('busqueda') {
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esBg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="130" rx="70" ry="8" fill="#000" opacity=".08"/>
          <circle cx="80" cy="70" r="42" fill="url(#esBg)"/>
          <circle cx="80" cy="70" r="30" fill="#fff" stroke="#3b82f6" stroke-width="4"/>
          <circle cx="80" cy="70" r="4" fill="#3b82f6"/>
          <path d="M78 55c-8 0-15 7-15 15" stroke="#93c5fd" stroke-width="3" fill="none" stroke-linecap="round"/>
          <line x1="106" y1="96" x2="130" y2="120" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
          <line x1="106" y1="96" x2="130" y2="120" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
          <path d="M52 30c2-2 6-2 8 0" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="150" cy="40" r="4" fill="#fbbf24"/>
          <circle cx="30" cy="110" r="3" fill="#a78bfa"/>
          <path d="M160 100l3 3M163 100l-3 3" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
        </svg>
      }
      @case ('error') {
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esErr" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#fecaca"/><stop offset="1" stop-color="#fca5a5"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="140" rx="70" ry="6" fill="#000" opacity=".08"/>
          <circle cx="100" cy="75" r="50" fill="url(#esErr)"/>
          <path d="M65 45l30-4 22 20-5 40-38 10-16-30z" fill="#fff"/>
          <path d="M78 65a4 4 0 1 0 8 0 4 4 0 0 0-8 0zM110 60a4 4 0 1 0 8 0 4 4 0 0 0-8 0z" fill="#dc2626"/>
          <path d="M80 90c8 6 20 6 28-2" stroke="#dc2626" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M52 35l14 8M148 35l-14 8" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
          <circle cx="30" cy="35" r="4" fill="#fbbf24"/>
          <circle cx="170" cy="115" r="3" fill="#8b5cf6"/>
        </svg>
      }
      @case ('ok') {
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esOk" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="140" rx="65" ry="6" fill="#000" opacity=".08"/>
          <circle cx="100" cy="75" r="50" fill="url(#esOk)"/>
          <circle cx="100" cy="75" r="34" fill="#10b981"/>
          <path d="M84 75l12 12 22-24" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- confetti -->
          <rect x="40" y="30" width="4" height="10" rx="1" fill="#fbbf24" transform="rotate(20 42 35)"/>
          <rect x="160" y="30" width="4" height="10" rx="1" fill="#f43f5e" transform="rotate(-30 162 35)"/>
          <rect x="30" y="90" width="4" height="10" rx="1" fill="#8b5cf6" transform="rotate(45 32 95)"/>
          <rect x="165" y="95" width="4" height="10" rx="1" fill="#06b6d4" transform="rotate(-15 167 100)"/>
          <circle cx="55" cy="15" r="3" fill="#fbbf24"/>
          <circle cx="150" cy="12" r="3" fill="#f43f5e"/>
          <circle cx="180" cy="60" r="3" fill="#8b5cf6"/>
          <circle cx="20" cy="60" r="3" fill="#06b6d4"/>
        </svg>
      }
      @case ('inbox') {
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esIx" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="140" rx="70" ry="6" fill="#000" opacity=".08"/>
          <circle cx="100" cy="80" r="52" fill="url(#esIx)"/>
          <!-- caja abierta -->
          <path d="M50 100h100l-10-38H60z" fill="#f59e0b"/>
          <path d="M50 100v20h100v-20z" fill="#d97706"/>
          <path d="M60 62h80l6 20H54z" fill="#fbbf24"/>
          <!-- líneas de vacío -->
          <path d="M75 90h15M110 90h15" stroke="#78350f" stroke-width="2" stroke-linecap="round" opacity=".3"/>
          <!-- estrella -->
          <path d="M100 40l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z" fill="#f59e0b"/>
          <circle cx="30" cy="55" r="4" fill="#a78bfa"/>
          <circle cx="170" cy="55" r="4" fill="#3b82f6"/>
        </svg>
      }
      @case ('config') {
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esCfg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#e9d5ff"/><stop offset="1" stop-color="#d8b4fe"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="140" rx="65" ry="6" fill="#000" opacity=".08"/>
          <circle cx="100" cy="75" r="50" fill="url(#esCfg)"/>
          <!-- Engrane -->
          <g transform="translate(100 75)">
            <circle r="24" fill="#8b5cf6"/>
            <circle r="10" fill="#fff"/>
            <rect x="-4" y="-32" width="8" height="10" rx="2" fill="#8b5cf6"/>
            <rect x="-4" y="22" width="8" height="10" rx="2" fill="#8b5cf6"/>
            <rect x="-32" y="-4" width="10" height="8" rx="2" fill="#8b5cf6"/>
            <rect x="22" y="-4" width="10" height="8" rx="2" fill="#8b5cf6"/>
            <rect x="-4" y="-32" width="8" height="10" rx="2" fill="#8b5cf6" transform="rotate(45)"/>
            <rect x="-4" y="22" width="8" height="10" rx="2" fill="#8b5cf6" transform="rotate(45)"/>
            <rect x="-32" y="-4" width="10" height="8" rx="2" fill="#8b5cf6" transform="rotate(45)"/>
            <rect x="22" y="-4" width="10" height="8" rx="2" fill="#8b5cf6" transform="rotate(45)"/>
          </g>
          <circle cx="35" cy="35" r="8" fill="#fbbf24"/>
          <circle cx="165" cy="115" r="6" fill="#10b981"/>
        </svg>
      }
      @default {
        <!-- lista / sin datos general -->
        <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="esLst" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#e0e7ff"/><stop offset="1" stop-color="#c7d2fe"/>
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="140" rx="70" ry="6" fill="#000" opacity=".08"/>
          <circle cx="100" cy="75" r="52" fill="url(#esLst)"/>
          <rect x="65" y="35" width="70" height="86" rx="6" fill="#fff" stroke="#6366f1" stroke-width="2"/>
          <rect x="75" y="48" width="30" height="4" rx="2" fill="#c7d2fe"/>
          <rect x="75" y="58" width="50" height="3" rx="1.5" fill="#e0e7ff"/>
          <rect x="75" y="65" width="40" height="3" rx="1.5" fill="#e0e7ff"/>
          <rect x="75" y="76" width="30" height="4" rx="2" fill="#c7d2fe"/>
          <rect x="75" y="86" width="50" height="3" rx="1.5" fill="#e0e7ff"/>
          <rect x="75" y="93" width="40" height="3" rx="1.5" fill="#e0e7ff"/>
          <rect x="75" y="104" width="30" height="4" rx="2" fill="#c7d2fe"/>
          <path d="M120 100l14-14" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
          <circle cx="140" cy="80" r="14" fill="none" stroke="#6366f1" stroke-width="3"/>
          <circle cx="35" cy="40" r="4" fill="#f59e0b"/>
          <circle cx="170" cy="35" r="3" fill="#10b981"/>
          <circle cx="30" cy="115" r="3" fill="#f43f5e"/>
        </svg>
      }
    }
  </div>
  @if (titulo) { <h3>{{ titulo }}</h3> }
  <p>{{ mensaje }}</p>
  @if (accionTexto) {
    <ng-content></ng-content>
  }
</div>
