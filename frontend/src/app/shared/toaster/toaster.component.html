<div class="toaster">
  @for (t of toasts(); track t.id) {
    <div class="toast" [class]="'toast--' + t.tipo">
      <div class="toast__icon">
        @switch (t.tipo) {
          @case ('exito') { <span>✓</span> }
          @case ('error') { <span>✕</span> }
          @case ('advertencia') { <span>!</span> }
          @default { <span>i</span> }
        }
      </div>
      <div class="toast__body">
        @if (t.titulo) { <strong>{{ t.titulo }}</strong> }
        <span>{{ t.mensaje }}</span>
      </div>
      <button class="toast__close" (click)="cerrar(t.id)" aria-label="Cerrar">×</button>
    </div>
  }
</div>
