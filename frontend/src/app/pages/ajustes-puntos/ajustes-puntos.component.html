<div class="page">
  <div class="page__header">
    <button class="volver" (click)="volver()"><app-icon name="arrow-left" [size]="14"></app-icon> Ajustes</button>
    <div>
      <h2>Ajuste de Puntos</h2>
      <p>Define cuántos soles gastados equivalen a un punto de fidelización.</p>
    </div>
  </div>

  <div class="card seccion">
    <label>Soles por punto</label>
    <div class="fila-input">
      <span>S/</span>
      <input type="number" min="0.01" step="0.01" [(ngModel)]="solesPorPunto" />
      <span>= 1 punto</span>
    </div>
    <p class="hint">Ej: si pones 1, por cada S/1 gastado el cliente gana 1 punto. Si pones 5, necesita gastar S/5 para ganar 1 punto.</p>
  </div>

  <div class="acciones">
    <button class="btn btn--ghost" (click)="volver()">Cancelar</button>
    <button class="btn btn--primario" (click)="guardar()" [disabled]="guardando() || solesPorPunto <= 0">
      {{ guardando() ? 'Guardando…' : 'Guardar cambios' }}
    </button>
  </div>
</div>
