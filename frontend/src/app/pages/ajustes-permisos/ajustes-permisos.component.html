<div class="page">
  <app-page-header icono="ban" color="gris" titulo="Permisos y accesos" subtitulo="Define qué módulos puede ver cada rol. El Administrador siempre tiene acceso total." volverTexto="Ajustes" (volver)="volver()">
    <button class="btn btn--primario" [disabled]="cargando() || guardando()" (click)="guardar()">
      {{ guardando() ? 'Guardando…' : 'Guardar cambios' }}
    </button>
  </app-page-header>

  @if (cargando()) {
    <div class="estado">Cargando…</div>
  } @else {
    <div class="card tabla-wrap">
      <table class="tabla-permisos">
        <thead>
          <tr>
            <th>Módulo</th>
            @for (r of rolesEditables(); track r.id) {
              <th class="centro">{{ r.nombre }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (m of modulos(); track m) {
            <tr>
              <td class="nombre">{{ etiquetas[m] || m }}</td>
              @for (r of rolesEditables(); track r.id) {
                <td class="centro">
                  <input type="checkbox" [checked]="tienePermiso(r.id, m)" (change)="toggle(r.id, m)" />
                </td>
              }
            </tr>
          }
        </tbody>
      </table>
    </div>
    <p class="hint">Los cambios se aplican la próxima vez que ese usuario inicie sesión.</p>
  }
</div>
