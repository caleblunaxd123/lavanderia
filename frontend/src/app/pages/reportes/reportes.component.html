<div class="page">
  <h2 class="page__titulo">Reportes</h2>
  <p class="page__sub">Elige un reporte para ver el detalle, filtrar por fecha y exportarlo.</p>

  <div class="grid">
    @for (r of reportes; track r.clave) {
      <a class="tarjeta card" [routerLink]="['/reportes', r.clave]">
        <div class="tarjeta__icono" [innerHTML]="r.icono"></div>
        <span>Reporte</span>
        <strong>{{ r.nombre }}</strong>
      </a>
    }
  </div>
</div>
